<div class="container mt-5">

    <mat-form-field>
        <input matInput placeholder="search" (keyup)="applyFilter($event)">
    </mat-form-field>

    <mat-form-field class="ms-5">      
        <mat-select (selectionChange)="sortProducts($event.value)">
            <mat-option value="priceLowHigh">Price: Low to High</mat-option>
            <mat-option value="priceHighLow">Price: High to Low</mat-option>
        </mat-select>
    </mat-form-field>

    <div class="row">
        <div class="col-md-4" *ngFor="let product of filteredProducts">
            <mat-card class="product-card" appearance="outlined" (click)="addToCart(product)">
                <img mat-card-image src="assets/images/{{product.image_url}}" alt="Photo of a Shiba Inu">
                <mat-card-content>
                    <mat-card-title>{{product.name}}</mat-card-title>
                    <mat-card-subtitle>{{product.price | currency:'USD'}}</mat-card-subtitle>
                </mat-card-content>
            </mat-card>
        </div>
    </div>
</div>
